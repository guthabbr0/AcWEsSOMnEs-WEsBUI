name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
            echo "package.json version is missing"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Python
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build Python package artifacts
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build .

      - name: Extract release notes from CHANGELOG
        if: steps.tag_check.outputs.exists == 'false'
        id: notes
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_VERSION"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^##\s+\[{re.escape(version)}\][^\n]*\n(?P<body>.*?)(?=^##\s+\[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(text)
          if match:
              body = f"## [{version}]\n" + match.group("body").strip()
          else:
              body = f"Release {version}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("body<<EOF\n")
              fh.write(body + "\n")
              fh.write("EOF\n")
          PY

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/*.whl
            dist/*.tar.gz
